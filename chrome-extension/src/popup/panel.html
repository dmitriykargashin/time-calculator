<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <!-- Preload the brand fonts so they're ready at first paint: this avoids the
       fallback→custom swap that shifts button metrics after render and leaves the
       side panel's hit-test region stale (panel-init.js also nudges a reflow as a
       backstop). Paths are relative to this file (src/popup/), same as theme-base.css. -->
  <link rel="preload" href="ABeeZee-Regular.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="preload" href="HankenGrotesk.ttf" as="font" type="font/ttf" crossorigin>
  <!-- Sets [data-theme] before paint (no flash), wires the header switch. -->
  <script src="theme.js"></script>
  <link rel="stylesheet" href="theme-base.css">
  <link rel="stylesheet" href="panel.css">
  <link rel="stylesheet" href="../../dist/popup.css">
  <!-- Chrome renders this as the side panel's own header title, so no in-page
       header is needed (see the removed .tc-head). -->
  <title>Time Calculator Cardamon</title>
</head>
<body class="has-motion">
  <div id="app"></div>

  <footer class="tc-foot">
    <!-- Status bar: color-theme switch on the left, store / site badges on the right. -->
    <div class="tc-theme" role="group" aria-label="Color theme">
      <button type="button" data-theme-set="system" title="Match system" aria-label="System theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="13" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      </button>
      <button type="button" data-theme-set="light" title="Light" aria-label="Light theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      </button>
      <button type="button" data-theme-set="dark" title="Dark" aria-label="Dark theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>
      </button>
    </div>
    <nav class="tc-badges" aria-label="Get the app or open on the web">
      <a class="tc-badge" href="https://play.google.com/store/apps/details?id=com.dmitriykargashin.cardamontimecalculator" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" width="19" height="19" aria-hidden="true">
          <path fill="#3DA50C" d="M3.6 2.3 13 12 3.6 21.7a1.4 1.4 0 0 1-.6-1.2V3.5c0-.5.2-.9.6-1.2Z"/>
          <path fill="#5C7D0E" d="M16.8 8.4 14.3 12l2.5 3.6 3.6-2.1c1-.6 1-2 0-2.6l-3.6-2.5Z"/>
          <path fill="#1f6c10" d="M4 2.1c.3-.1.7-.1 1 .1l11 6.3-2.6 2.6L4 2.1Z"/>
          <path fill="#2f9412" d="M4 21.9 13.4 12.5 16 15.1 5 21.8c-.3.2-.7.2-1 .1Z"/>
        </svg>
        <span><small>Get it on</small>Google Play</span>
      </a>
      <a class="tc-badge" href="https://apps.apple.com/app/id6789162864" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M16 1c.1 1.2-.4 2.4-1.1 3.2-.8.9-2 1.6-3.1 1.5-.1-1.2.4-2.4 1.1-3.2C13.7 1.6 15 .9 16 1Zm3.5 16.6c-.6 1.3-.9 1.9-1.6 3-1 1.6-2.5 3.6-4.3 3.6-1.6 0-2-1-4.2-1-2.1 0-2.6 1-4.2 1-1.8 0-3.2-1.8-4.2-3.4C-.9 17.4-1.2 11 1.5 7.9 2.7 6.4 4.4 5.6 6 5.6c1.7 0 2.7 1 4.1 1 1.3 0 2.1-1 4.1-1 1.4 0 2.9.8 4 2.1-3.5 1.9-3 6.9 1.3 7.9Z"/></svg>
        <span><small>Download on the</small>App Store</span>
      </a>
      <a class="tc-badge web" href="https://www.timecalculator.app" target="_blank" rel="noopener noreferrer">
        <img src="../../icons/icon-48.png" alt="" width="18" height="18">
        <span><small>Open it on the</small>Web</span>
      </a>
    </nav>
  </footer>

  <!-- Clear any persisted card width so the card fills the panel. -->
  <script src="panel-init.js"></script>
  <!-- Dart engine sets globalThis.evaluateTime; must load before the Vue app. -->
  <script src="../engine/time_engine.js"></script>
  <!-- Built from the site's real TimeCalculator.vue (see build/vite.config.mjs). -->
  <script src="../../dist/popup.js"></script>
</body>
</html>
