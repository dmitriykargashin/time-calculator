<!doctype html><html><head><meta charset="utf-8"><style>
@font-face{font-family:'Hanken Grotesk';src:url('file:///Volumes/Additional/My Projects/Apps/time-calculator/time-calculator/store-listings/src/fonts/HankenGrotesk.ttf');font-weight:100 900;font-style:normal}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:1080px;height:1920px}
.poster{position:relative;width:1080px;height:1920px;overflow:hidden;
  background:
    radial-gradient(864px 614px at 86% 6%, rgba(79,150,40,.16), transparent 62%),
    radial-gradient(756px 538px at 8% 96%, rgba(92,125,14,.12), transparent 60%),
    linear-gradient(168deg, #f4efe3 0%, #eef0de 48%, #e8eed6 100%);
  font-family:'Hanken Grotesk',sans-serif;-webkit-font-smoothing:antialiased}
.poster.dark{background:
    radial-gradient(864px 614px at 86% 6%, rgba(79,150,40,.20), transparent 62%),
    radial-gradient(756px 538px at 8% 96%, rgba(92,125,14,.16), transparent 60%),
    linear-gradient(168deg, #20241a 0%, #181b12 50%, #11140d 100%)}

.caption{position:absolute;top:0;left:0;right:0;padding:116px 81px 0;text-align:center}
.caption h1{font-weight:800;font-size:76px;line-height:1.06;letter-spacing:-0.025em;color:#1c1b15}
.caption h1 .a{color:#1f6c10}
.caption p{margin-top:27px;font-weight:500;font-size:39px;line-height:1.3;color:#524d3f;letter-spacing:-0.005em}
.dark .caption h1{color:#f2ecdb}
.dark .caption h1 .a{color:#7fd24a}
.dark .caption p{color:#bdb6a3}

.phone{position:absolute;top:424px;left:202px;width:676px;
  padding:20px;background:linear-gradient(160deg,#211f17,#0d0c08);border-radius:53px;
  box-shadow:0 2px 0 rgba(255,255,255,.05) inset,
    0 29px 64px rgba(24,22,12,.32),
    0 8px 19px rgba(24,22,12,.22)}
.screen{position:relative;width:636px;height:1376px;overflow:hidden;border-radius:33px;background:#f7f4ec}
.dark .screen{background:#16140d}
.shot{display:block;width:636px;height:1376px}

.sb{position:absolute;z-index:4;top:0;left:0;right:0;height:59px;display:flex;align-items:center;justify-content:space-between;
  padding:0 45px;color:#1c1b15}
.dark .sb{color:#f2ecdb}
.sb-time{font-weight:600;font-size:21px;letter-spacing:.01em}
.sb-icons{display:flex;align-items:center;gap:9px}
.sb-icons svg{height:14px;width:auto}
.sb-icons .bat{height:14px}

.notch{position:absolute;z-index:5;left:50%;transform:translateX(-50%)}
.notch.island{top:13px;width:191px;height:53px;border-radius:999px;background:#070707}
.notch.hole{top:14px;width:22px;height:22px;border-radius:999px;background:#0a0a0a;box-shadow:0 0 0 2px rgba(0,0,0,.25)}
</style></head>
<body><div class="poster">
  <div class="caption"><h1>Turn time<br>into <span class="a">pay</span></h1><p>See totals per hour, day, week or year.</p></div>
  <div class="phone"><div class="screen">
    <img class="shot" src="file:///Volumes/Additional/My Projects/Apps/time-calculator/time-calculator/store-listings/src/screens/rate.png">
    <div class="sb"><div class="sb-time">9:41</div>
    <div class="sb-icons"><svg viewBox="0 0 20 14" fill="currentColor"><rect x="0" y="9" width="3.2" height="5" rx="1"/><rect x="5" y="6" width="3.2" height="8" rx="1"/><rect x="10" y="3" width="3.2" height="11" rx="1"/><rect x="15" y="0" width="3.2" height="14" rx="1"/></svg><svg viewBox="0 0 20 15" fill="currentColor"><path d="M10 3.2c3.2 0 6.1 1.3 8.2 3.4l-1.7 1.8A9 9 0 0 0 10 5.8 9 9 0 0 0 3.5 8.4L1.8 6.6A11.6 11.6 0 0 1 10 3.2Z"/><path d="M10 8.1c1.8 0 3.5.7 4.8 2l-1.8 1.8A4.4 4.4 0 0 0 10 10.6c-1.2 0-2.3.4-3 1.3L5.2 10.1A6.9 6.9 0 0 1 10 8.1Z"/><circle cx="10" cy="13" r="1.6"/></svg><span class="bat"><svg viewBox="0 0 28 14" fill="none"><rect x="0.7" y="0.7" width="23" height="12.6" rx="3.2" stroke="currentColor" stroke-width="1.3" opacity="0.5"/><rect x="2.4" y="2.4" width="17" height="9.2" rx="1.8" fill="currentColor"/><rect x="25" y="4.6" width="2.2" height="4.8" rx="1.1" fill="currentColor" opacity="0.6"/></svg></span></div></div><div class="notch hole"></div>
  </div></div>
</div></body></html>
